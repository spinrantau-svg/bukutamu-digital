<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu Digital | Setda Kab. Tapin</title>
    <!-- Tailwind CSS & Animate.css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --secondary: #7c3aed;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3); 
        }

        .bg-gradient-tapin { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
        }

        .input-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-card:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -10px rgba(79, 70, 229, 0.2);
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
    </style>
</head>
<body class="pb-28">

    <!-- HEADER NAVIGATION -->
    <header class="fixed top-0 w-full z-50 glass">
        <div class="max-w-xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-tapin rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-bold">T</span>
                </div>
                <div>
                    <h1 class="font-extrabold text-slate-800 leading-tight text-sm">SETDA TAPIN</h1>
                    <p class="text-[9px] text-indigo-500 font-bold tracking-[0.2em] uppercase">Digital Presence</p>
                </div>
            </div>
            <div id="date-display" class="text-[10px] font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                Memuat...
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="pt-24 px-4 max-w-xl mx-auto">
        <section class="animate__animated animate__fadeIn">
            <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-slate-50">
                <header class="mb-8">
                    <h2 class="text-2xl font-extrabold text-slate-800">Buku Tamu Digital</h2>
                    <p class="text-sm text-slate-400 mt-1">Sekretariat Daerah Kabupaten Tapin</p>
                </header>

                <form id="guestForm" class="space-y-6">
                    <div class="input-card">
                        <label class="text-[11px] font-bold text-slate-500 mb-2 block uppercase tracking-widest">👤 Nama Lengkap</label>
                        <input type="text" name="nama" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-2 ring-slate-100 focus:ring-indigo-500 outline-none text-sm font-semibold">
                    </div>

                    <div class="input-card">
                        <label class="text-[11px] font-bold text-slate-500 mb-2 block uppercase tracking-widest">🏢 Asal Instansi / Alamat</label>
                        <input type="text" name="asal" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-2 ring-slate-100 focus:ring-indigo-500 outline-none text-sm font-semibold">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-card">
                            <label class="text-[11px] font-bold text-slate-500 mb-2 block uppercase tracking-widest">👥 Jumlah</label>
                            <input type="number" name="jumlah" required min="1" class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-2 ring-slate-100 focus:ring-indigo-500 outline-none text-sm font-semibold">
                        </div>
                        <div class="input-card">
                            <label class="text-[11px] font-bold text-slate-500 mb-2 block uppercase tracking-widest">📱 WhatsApp</label>
                            <input type="tel" name="kontak" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-2 ring-slate-100 focus:ring-indigo-500 outline-none text-sm font-semibold">
                        </div>
                    </div>

                    <div class="input-card">
                        <label class="text-[11px] font-bold text-slate-500 mb-2 block uppercase tracking-widest">🚪 Bagian Tujuan</label>
                        <select name="ruangan" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-2 ring-slate-100 focus:ring-indigo-500 outline-none text-sm font-semibold">
                            <option value="">Pilih Bagian...</option>
                            <option>Bagian Protokol & Komunikasi Pimpinan</option>
                            <option>Bagian Umum</option>
                            <option>Bagian Hukum</option>
                            <option>Bagian Organisasi</option>
                            <option>Bagian Pemerintahan</option>
                            <option>Bagian Kesejahteraan Rakyat</option>
                            <option>Bagian Perekonomian & SDA</option>
                            <option>Bagian Pengadaan Barang & Jasa</option>
                        </select>
                    </div>

                    <div class="input-card">
                        <label class="text-[11px] font-bold text-slate-500 mb-2 block uppercase tracking-widest">📋 Kategori Tujuan</label>
                        <select name="kategori" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-2 ring-slate-100 focus:ring-indigo-500 outline-none text-sm font-semibold">
                            <option value="">Pilih Kategori</option>
                            <option>Rapat Koordinasi</option>
                            <option>Konsultasi</option>
                            <option>Audiensi</option>
                            <option>Silaturahmi</option>
                            <option>Penyampaian Laporan</option>
                            <option>Kunjungan Kerja</option>
                            <option>Urusan Administrasi</option>
                            <option>Lainnya</option>
                        </select>
                    </div>

                    <div class="input-card">
                        <label class="text-[11px] font-bold text-slate-500 mb-2 block uppercase tracking-widest">💬 Maksud & Tujuan</label>
                        <textarea name="perihal" rows="3" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-2 ring-slate-100 focus:ring-indigo-500 outline-none text-sm font-semibold"></textarea>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full bg-gradient-tapin text-white font-bold py-5 rounded-[2rem] shadow-xl hover:opacity-90 transition-all flex items-center justify-center gap-3">
                        <span id="btn-text">KIRIM DATA</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-0 w-full">
        <div class="bg-amber-400 py-1 overflow-hidden">
            <div class="animate-marquee whitespace-nowrap text-[9px] font-bold text-amber-900 uppercase">
                Selamat Datang di Setda Tapin --- Harap isi data dengan benar --- Terima Kasih
            </div>
        </div>
        <div class="glass py-4 text-center text-[10px] font-bold text-slate-400">
            SETDA KABUPATEN TAPIN
        </div>
    </footer>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQ352JDWTvC82ChM7h6EtKz-hbTvTVTvyeo9jG_3uLEKbAVvhNEI0IHMe3xOfkPML2Tw/exec';

        function updateDate() {
            const now = new Date();
            document.getElementById('date-display').innerText = now.toLocaleString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Makassar' }) + ' WITA';
        }
        setInterval(updateDate, 1000);
        updateDate();

        const form = document.getElementById('guestForm');
        const submitBtn = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            document.getElementById('btn-text').innerText = "MENGIRIM...";

            const payload = {
                nama: form.nama.value,
                asal: form.asal.value,
                jumlah: form.jumlah.value,
                kontak: form.kontak.value,
                ruangan: form.ruangan.value,
                kategori: form.kategori.value,
                perihal: form.perihal.value
            };

            try {
                // Mengirim sebagai JSON String via POST
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                alert('Data berhasil terkirim!');
                form.reset();
            } catch (error) {
                alert('Gagal mengirim data. Cek koneksi internet.');
            } finally {
                submitBtn.disabled = false;
                document.getElementById('btn-text').innerText = "KIRIM DATA";
            }
        });
    </script>
</body>
</html>
